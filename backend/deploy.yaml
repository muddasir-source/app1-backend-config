apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: app1-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: syedmuddasir507/app1-backend:v1.1.0
          ports:
            - containerPort: 5000
